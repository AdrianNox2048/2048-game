<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nox2048 v.g20</title>

<style>

body{
background:#f6fbff;
text-align:center;
font-family:Arial;
margin:0;
user-select:none;
}

h1{
color:#5a9bd5;
margin-top:20px;
font-size:42px;
}

.score-wrap{
margin-top:8px;
display:flex;
justify-content:center;
gap:20px;
font-weight:bold;
color:#5a9bd5;
}

.score-box{
background:white;
padding:6px 14px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

#board{
position:relative;
width:min(92vw,520px);
height:min(92vw,520px);
margin:20px auto;
background:#d9e9f3;
border-radius:12px;
overflow:hidden;
}

.cell{
position:absolute;
width:24.5%;
height:24.5%;
background:#f0f7fb;
border-radius:8px;
}

.tile{
position:absolute;
width:24.5%;
height:24.5%;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-weight:bold;
transition:all 1s cubic-bezier(.12,.72,.18,1);
}

.tile.merge{
animation:merge .45s cubic-bezier(.34,1.56,.64,1);
}

.tile.new{
animation:new .5s ease;
}

@keyframes new{
0%{transform:scale(.4)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

@keyframes merge{
0%{transform:scale(1)}
40%{transform:scale(1.25)}
70%{transform:scale(.95)}
100%{transform:scale(1)}
}

.emoji{
font-size:6vw;
}

.num{
font-size:3vw;
}

.version{
position:fixed;
right:10px;
bottom:10px;
color:#bcd4e6;
font-size:12px;
}

</style>
</head>

<body>

<h1>Nox2048</h1>

<div class="score-wrap">
<div class="score-box">Score <span id="score">0</span></div>
<div class="score-box">Best <span id="best">0</span></div>
</div>

<div id="board"></div>

<div class="version">v.g20</div>

<script>

const SIZE=4

let board=[]
let score=0
let best=localStorage.getItem("best2048")||0
let locked=false

document.getElementById("best").innerText=best

function emoji(v){
return{
2:"🐹",4:"🐭",8:"🐻",16:"🐱",
32:"🐶",64:"🐼",128:"🦊",
256:"🐯",512:"🐨",
1024:"🐮",2048:"👑"
}[v]
}

function color(v){
return{
2:"#fff3d6",
4:"#f1f1f1",
8:"#d2a679",
16:"#ffd6a5",
32:"#cde7ff",
64:"#ffffff",
128:"#ffb4a2",
256:"#ffe066",
512:"#d9d9d9",
1024:"#fff0cc",
2048:"#ffd700"
}[v]
}

function pos(i){
return{
x:(i%4)*25,
y:Math.floor(i/4)*25
}
}

function init(){

board=new Array(16).fill(0)
score=0

const b=document.getElementById("board")
b.innerHTML=""

for(let i=0;i<16;i++){

let c=document.createElement("div")
c.className="cell"

let p=pos(i)

c.style.left=p.x+"%"
c.style.top=p.y+"%"

b.appendChild(c)
}

add()
add()
draw()

}

function add(){

let empty=[]

board.forEach((v,i)=>{
if(v==0) empty.push(i)
})

if(!empty.length) return

let i=empty[Math.floor(Math.random()*empty.length)]

board[i]=Math.random()<.9?2:4

}

function draw(){

document.querySelectorAll(".tile").forEach(t=>t.remove())

board.forEach((v,i)=>{

if(!v) return

let t=document.createElement("div")

t.className="tile"
t.style.background=color(v)

t.innerHTML=
`<div class="emoji">${emoji(v)}</div>
<div class="num">${v}</div>`

let p=pos(i)

t.style.left=p.x+"%"
t.style.top=p.y+"%"

document.getElementById("board").appendChild(t)

})

document.getElementById("score").innerText=score

if(score>best){
best=score
localStorage.setItem("best2048",best)
document.getElementById("best").innerText=best
}

}

function move(dir){

if(locked) return
locked=true

let moved=false

for(let i=0;i<4;i++){

let arr=[]
let index=[]

for(let j=0;j<4;j++){
let k=(dir=="L"||dir=="R")?i*4+j:j*4+i
arr.push(board[k])
index.push(k)
}

if(dir=="R"||dir=="D"){
arr.reverse()
index.reverse()
}

let filtered=arr.filter(v=>v)

for(let k=0;k<filtered.length-1;k++){
if(filtered[k]==filtered[k+1]){
filtered[k]*=2
score+=filtered[k]
filtered[k+1]=0
}
}

filtered=filtered.filter(v=>v)

while(filtered.length<4) filtered.push(0)

if(dir=="R"||dir=="D") filtered.reverse()

for(let j=0;j<4;j++){
if(board[index[j]]!=filtered[j]) moved=true
board[index[j]]=filtered[j]
}

}

if(moved){
add()
draw()
}

setTimeout(()=>locked=false,1000)

}

let sx,sy

window.addEventListener("pointerdown",e=>{
sx=e.clientX
sy=e.clientY
})

window.addEventListener("pointerup",e=>{

let dx=e.clientX-sx
let dy=e.clientY-sy

if(Math.abs(dx)>Math.abs(dy)){
if(Math.abs(dx)>20) move(dx>0?"R":"L")
}else{
if(Math.abs(dy)>20) move(dy>0?"D":"U")
}

})

init()

</script>
</body>
</html>
